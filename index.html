<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON Gangster Mini App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/brython/3.10.7/brython.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/brython/3.10.7/brython_stdlib.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; overflow: hidden; }
        .slot-container { height: 120px; overflow: hidden; border: 1px solid rgba(234, 179, 8, 0.3); }
        .slot-track { transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body onload="brython()">
    <div class="flex flex-col h-screen p-4 justify-between">
        <div class="glass rounded-2xl p-4 flex justify-between items-center shadow-xl">
            <div>
                <p class="text-xs text-gray-400 font-bold uppercase">Баланс</p>
                <p id="balance" class="text-xl font-black text-yellow-500">100.00 TON</p>
            </div>
            <div class="text-right">
                <p id="status_label" class="text-sm font-bold text-green-400 uppercase tracking-tighter">GANGSTER</p>
            </div>
        </div>

        <div class="relative py-8">
            <div class="glass rounded-3xl p-2 grid grid-cols-3 gap-2 relative z-10">
                <div class="slot-container rounded-xl bg-black/40"><div id="track-1" class="slot-track"></div></div>
                <div class="slot-container rounded-xl bg-black/40"><div id="track-2" class="slot-track"></div></div>
                <div class="slot-container rounded-xl bg-black/40"><div id="track-3" class="slot-track"></div></div>
                <div class="absolute top-1/2 left-0 w-full h-0.5 bg-yellow-500/50 z-20"></div>
            </div>
        </div>

        <button id="spin_btn" class="w-full bg-gradient-to-r from-yellow-600 to-yellow-400 py-5 rounded-2xl font-black text-black text-lg uppercase shadow-lg active:scale-95 transition-all">
            Крутить за 5 TON
        </button>
    </div>

    <script type="text/python">
        from browser import document, html, timer, window
        import random

        # Пути к нормальным иконкам (Pepe, Candy, Poo, Helmet)
        ICON_POOL = [
            {"name": "Pepe", "img": "https://raw.githubusercontent.com/Tarikul-Islam-Anik/Telegram-Animated-Emojis/main/Smileys/Frog.png"}, 
            {"name": "Candy", "img": "https://raw.githubusercontent.com/Tarikul-Islam-Anik/Telegram-Animated-Emojis/main/Objects/Candy.png"},
            {"name": "Poo", "img": "https://raw.githubusercontent.com/Tarikul-Islam-Anik/Telegram-Animated-Emojis/main/Smileys/Pile%20of%20Poo.png"},
            {"name": "Helmet", "img": "https://raw.githubusercontent.com/Tarikul-Islam-Anik/Telegram-Animated-Emojis/main/Objects/Closed%20Steel%20Helmet.png"},
            {"name": "Diamond", "img": "https://raw.githubusercontent.com/Tarikul-Islam-Anik/Telegram-Animated-Emojis/main/Objects/Gem%20Stone.png"}
        ]

        balance = 100.0
        tg = window.Telegram.WebApp

        def create_card(icon):
            card = html.DIV(Class="h-[120px] flex items-center justify-center p-2")
            card <= html.IMG(src=icon['img'], Class="w-16 h-16 shadow-lg")
            return card

        def fill():
            for i in range(1, 4):
                track = document[f"track-{i}"]
                track.html = ""
                for _ in range(30):
                    track <= create_card(random.choice(ICON_POOL))

        fill()

        def spin(ev):
            global balance
            if balance < 5:
                tg.showAlert("Деньги кончились. Сходи за пивом и возвращайся.")
                return

            document["spin_btn"].disabled = True
            balance -= 5
            document["balance"].text = f"{balance:.2f} TON"
            tg.HapticFeedback.impactOccurred('heavy')

            win_icon = random.choice(ICON_POOL)
            fail_icon = ICON_POOL[(ICON_POOL.index(win_icon) + 1) % len(ICON_POOL)]
            
            tracks = [document["track-1"], document["track-2"], document["track-3"]]
            for i, track in enumerate(tracks):
                target = win_icon if i < 2 else fail_icon
                track.children[-1].html = create_card(target).html
                track.style.transform = "translateY(-3480px)" # 120px * 29

            def end():
                tg.showPopup({"title": "Мимо!", "message": "Почти выпал джекпот!"})
                for t in tracks:
                    t.style.transition = "none"
                    t.style.transform = "translateY(0)"
                timer.set_timeout(lambda: setattr(document["track-1"].style, "transition", "transform 4s"), 50)
                document["spin_btn"].disabled = False

            timer.set_timeout(end, 4500)

        document["spin_btn"].bind("click", spin)
    </script>
</body>
</html>
