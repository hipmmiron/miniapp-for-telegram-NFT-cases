<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --gold: linear-gradient(135deg, #d4af37 0%, #f9f295 50%, #b38728 100%);
            --dark-bg: #0a0a0a;
            --card-bg: #161616;
            --text: #e0e0e0;
        }
        body {
            background-color: var(--dark-bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .header { margin-bottom: 30px; text-align: center; }
        .header h1 { 
            background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 28px; text-transform: uppercase; letter-spacing: 2px;
        }
        .container {
            width: 100%; max-width: 600px;
            display: grid; gap: 20px;
        }
        .case-card {
            background: var(--card-bg);
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 20px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }
        .case-card:active { transform: scale(0.97); border-color: #d4af37; }
        .case-info h3 { margin: 0; font-size: 20px; color: #fff; }
        .case-info p { margin: 5px 0 0; font-size: 13px; color: #777; }
        .price-badge {
            background: var(--gold);
            color: #000;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }
        /* Стили для десктопа */
        @media (min-width: 768px) {
            .container { grid-template-columns: 1fr 1fr; max-width: 900px; }
            .header h1 { font-size: 40px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Gangster Luxury</h1>
        <p>Выбери свой путь к успеху</p>
    </div>

    <div class="container" id="case-list"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.backgroundColor = '#0a0a0a';
        tg.headerColor = '#0a0a0a';

        const cases = [
            { name: "Street Hustle", price: 10, desc: "Мелочь в карманах", icon: "📦" },
            { name: "Ghetto Gold", price: 100, desc: "Уже серьезно", icon: "💰" },
            { name: "Cartel Supply", price: 500, desc: "Для проверенных", icon: "🚛" },
            { name: "Mafia Reserve", price: 2000, desc: "Высший свет", icon: "🍷" },
            { name: "The Godfather", price: 10000, desc: "Легендарный статус", icon: "🍑" }
        ];

        function render() {
            const list = document.getElementById('case-list');
            list.innerHTML = cases.map(c => `
                <div class="case-card" onclick="openCase('${c.name}', ${c.price}, '${c.icon}')">
                    <div class="case-info">
                        <h3>${c.name}</h3>
                        <p>${c.desc}</p>
                    </div>
                    <div class="price-badge">${c.price} 🪙</div>
                </div>
            `).join('');
        }

        function openCase(name, price, prize) {
            // Тут должна быть анимация прокрута, но для теста шлем данные сразу
            if (confirm(`Открыть ${name} за ${price} монеток?`)) {
                tg.sendData(JSON.stringify({
                    cost: price,
                    prize: prize
                }));
            }
        }

        render();
    </script>
</body>
</html>
